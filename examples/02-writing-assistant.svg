<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600"
     font-family="Inter, 'SF Pro Text', system-ui, sans-serif">
  <!-- ================================================================
       Example 02 · Composition C (single person + foreground UI card)
       Product: AI writing assistant · accent #7C5CFF (default purple)
       ================================================================ -->
  <defs>
    <style><![CDATA[
      .ink   { stroke:#111111; fill:none; stroke-width:2; stroke-linejoin:round; stroke-linecap:round; }
      .thin  { stroke:#111111; fill:none; stroke-width:1.4; }
      .skin  { fill:#F4C7A8; }
      .hair  { fill:#111111; }
      .accent{ fill:#7C5CFF; }
      .accS  { stroke:#7C5CFF; fill:none; stroke-width:1.6; }
      .txt-b { font-weight:700; fill:#111111; }
      .txt   { fill:#111111; }
      .txt-m { fill:#9CA3AF; }
    ]]></style>
  </defs>

  <rect width="900" height="600" fill="#FFFFFF"/>

  <!-- desk hairline -->
  <line x1="110" y1="530" x2="640" y2="530" class="thin"/>

  <!-- ============ BACKGROUND: half-body character ============ -->
  <g id="person" transform="translate(140,180)">
    <!-- torso / sweater -->
    <path d="M0,280 Q0,180 90,160 Q180,180 180,280 L180,300 L0,300 Z" class="ink" fill="#FFFFFF"/>
    <!-- collar -->
    <path d="M70,170 L90,190 L110,170" class="ink" stroke-width="1.6"/>
    <!-- neck -->
    <path d="M80,140 L100,140 L104,168 L76,168 Z" class="skin"/>
    <!-- head -->
    <circle cx="90" cy="100" r="52" class="skin"/>
    <!-- hair (bob) -->
    <path d="M40,90 Q40,40 90,40 Q140,40 140,90 Q140,130 122,140 L122,90 Q90,80 58,90 L58,140 Q40,130 40,90 Z" class="hair"/>
    <!-- eyes -->
    <circle cx="72" cy="102" r="2.4" fill="#111"/>
    <circle cx="108" cy="102" r="2.4" fill="#111"/>
    <!-- smile -->
    <path d="M76,120 Q90,128 104,120" class="thin"/>
    <!-- arm reaching toward card -->
    <path d="M160,220 Q220,220 260,250 Q290,270 300,290" class="ink" fill="none" stroke-width="2"/>
    <!-- hand -->
    <circle cx="305" cy="293" r="14" class="skin"/>
    <path d="M305,282 L305,270" class="thin" stroke-width="1.6"/>
    <path d="M312,285 L318,278" class="thin" stroke-width="1.6"/>
    <path d="M296,289 L288,286" class="thin" stroke-width="1.6"/>
    <path d="M298,300 L292,306" class="thin" stroke-width="1.6"/>
  </g>

  <!-- ============ FOREGROUND: UI card (document with AI suggestion) ============ -->
  <g id="card" transform="translate(360,100)">
    <rect x="0" y="0" width="420" height="400" rx="14" class="ink" fill="#FFFFFF"/>
    <!-- top bar -->
    <circle cx="18" cy="20" r="4" fill="#F26D6D"/>
    <circle cx="34" cy="20" r="4" fill="#F1C24B"/>
    <circle cx="50" cy="20" r="4" fill="#5FC98F"/>
    <circle cx="396" cy="20" r="8" class="accent"/>
    <line x1="0" y1="38" x2="420" y2="38" class="thin" stroke-width="1"/>

    <!-- toolbar -->
    <g transform="translate(20,54)" fill="#111">
      <text font-size="11" x="0" y="10" font-weight="700">B</text>
      <text font-size="11" x="18" y="10" font-style="italic">I</text>
      <text font-size="11" x="34" y="10" text-decoration="underline">U</text>
      <line x1="52" y1="4" x2="52" y2="14" class="thin" stroke-width="1"/>
      <text font-size="11" x="60" y="10">H1</text>
      <text font-size="11" x="82" y="10">H2</text>
      <line x1="102" y1="4" x2="102" y2="14" class="thin" stroke-width="1"/>
      <text font-size="11" x="110" y="10" class="txt-m">Draft · saved</text>
    </g>

    <!-- title -->
    <text x="20" y="98" font-size="18" class="txt-b">On-call rotation, redesigned</text>

    <!-- body paragraphs (as lines) -->
    <g stroke="#111" stroke-width="1.2" opacity="0.85">
      <line x1="20" y1="122" x2="392" y2="122"/>
      <line x1="20" y1="138" x2="384" y2="138"/>
      <line x1="20" y1="154" x2="360" y2="154"/>
      <line x1="20" y1="170" x2="290" y2="170"/>
    </g>

    <!-- suggested paragraph (soft purple highlight) -->
    <g transform="translate(20,190)">
      <rect x="0" y="0" width="380" height="86" rx="8" fill="#F5F1FF"/>
      <rect x="0" y="0" width="4" height="86" class="accent"/>
      <text x="16" y="20" font-size="11" font-weight="700" fill="#7C5CFF">SUGGESTED — sharper opener</text>
      <text x="16" y="42" font-size="12" class="txt">The old rotation optimized for coverage.</text>
      <text x="16" y="58" font-size="12" class="txt">The new one optimizes for who's on the</text>
      <text x="16" y="74" font-size="12" class="txt">hook when it actually breaks.</text>
    </g>

    <!-- accept / dismiss -->
    <g transform="translate(20,296)">
      <rect x="0" y="0" width="88" height="24" rx="12" class="accent"/>
      <text x="44" y="16" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Accept</text>
      <text x="102" y="16" font-size="11" fill="#7C5CFF" font-weight="700">Rewrite</text>
      <text x="170" y="16" font-size="11" class="txt-m">Dismiss</text>
    </g>

    <!-- more body lines -->
    <g stroke="#111" stroke-width="1.2" opacity="0.85">
      <line x1="20" y1="344" x2="390" y2="344"/>
      <line x1="20" y1="360" x2="340" y2="360"/>
      <line x1="20" y1="376" x2="280" y2="376"/>
    </g>
  </g>

  <!-- ============ AI PROMPT PILL ============ -->
  <g id="pill" transform="translate(500,74)">
    <rect x="0" y="0" width="230" height="34" rx="17" fill="#FFFFFF" class="accS"/>
    <g transform="translate(12,10)" fill="#7C5CFF">
      <path d="M7,0 L8.4,5.6 L14,7 L8.4,8.4 L7,14 L5.6,8.4 L0,7 L5.6,5.6 Z"/>
    </g>
    <text x="34" y="22" font-size="12" font-weight="600" fill="#111">Rewrite in your voice</text>
    <g transform="translate(208,10)" fill="#111">
      <path d="M0,0 L0,14 L4,10 L7,15 L9,14 L6,9 L11,9 Z"/>
    </g>
  </g>

  <!-- ============ SCATTERED DECORATIONS ============ -->
  <!-- thought bubble above head -->
  <g transform="translate(160,80)">
    <ellipse cx="46" cy="30" rx="52" ry="26" class="accent"/>
    <circle cx="6" cy="66" r="6" class="accent"/>
    <circle cx="0" cy="80" r="3" class="accent"/>
    <line x1="20" y1="24" x2="72" y2="24" stroke="#FFFFFF" stroke-width="1.6"/>
    <line x1="20" y1="32" x2="60" y2="32" stroke="#FFFFFF" stroke-width="1.6"/>
    <line x1="20" y1="40" x2="52" y2="40" stroke="#FFFFFF" stroke-width="1.6"/>
  </g>

  <!-- pencil bottom-right -->
  <g transform="translate(760,510) rotate(30)">
    <rect x="0" y="0" width="72" height="8" rx="1" class="accent"/>
    <path d="M72,0 L82,4 L72,8 Z" fill="#4A2FCC"/>
    <rect x="0" y="0" width="12" height="8" fill="#4A2FCC"/>
  </g>

  <!-- sparkle top-right of card -->
  <g transform="translate(770,150)" fill="#7C5CFF">
    <path d="M10,0 L12,8 L20,10 L12,12 L10,20 L8,12 L0,10 L8,8 Z"/>
  </g>

  <!-- small note card half-hidden behind main card, on right -->
  <g transform="translate(770,340)">
    <rect x="0" y="0" width="80" height="56" rx="6" fill="#F0EAFF"/>
    <line x1="10" y1="14" x2="60" y2="14" stroke="#B7A5FF" stroke-width="1.2"/>
    <line x1="10" y1="26" x2="52" y2="26" stroke="#B7A5FF" stroke-width="1.2"/>
    <line x1="10" y1="38" x2="42" y2="38" stroke="#B7A5FF" stroke-width="1.2"/>
  </g>

  <!-- outlined speech bubble bottom-left -->
  <g transform="translate(90,470)">
    <path d="M0,10 Q0,0 10,0 L54,0 Q64,0 64,10 L64,24 Q64,34 54,34 L26,34 L20,42 L18,34 L10,34 Q0,34 0,24 Z" class="ink" fill="#FFFFFF" stroke-width="1.6"/>
    <line x1="10" y1="12" x2="52" y2="12" class="thin" stroke-width="1.2"/>
    <line x1="10" y1="22" x2="44" y2="22" class="thin" stroke-width="1.2"/>
  </g>
</svg>
